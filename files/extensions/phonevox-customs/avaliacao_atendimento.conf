[avaliacao_atendimento]
exten => h,1,Set(AVALIACAO=0)
    same => h,n,Macro(hangupcall)

    same => s,1,NoOp(<< Avaliacao de atendimento >>)

    same => s,n,Set(DIR_PHONEVOX=phonevox-customs)

    same => s,n,Set(AVALIACAO=1)
    same => s,n,Set(CAUSADOR=atendente)
    same => s,n,Set(TIMEOUT(digit)=3)
    same => s,n,Set(atendente=${CONNECTEDLINE(num)})
    same => s,n,Background(${DIR_PHONEVOX}/avaliacao_atendimento)
    same => s,n,WaitExten(10)
    same => s,n,Background(${DIR_PHONEVOX}/avaliacao_atendimento)
    same => s,n,WaitExten(10)
    same => s,n,Hangup()

exten => 0,1,NoOp(<< Nota do cliente inferior a 1 >>)
    same => 0,n,Goto(${CONTEXT},1,1)

exten => _[1-5],1,NoOp(<< Nota do cliente ${CALLERID(num)} para o atendente ${atendente}: N${EXTEN} >>)
    same => _[1-5],n,Set(nota=${EXTEN})
    same => _[1-5],n,GotoIf($["${nota}" = "1"]?um)
    same => _[1-5],n,GotoIf($["${nota}" = "2"]?dois)
    same => _[1-5],n,GotoIf($["${nota}" = "3"]?tres)
    same => _[1-5],n,GotoIf($["${nota}" = "4"]?quatro)
    same => _[1-5],n,GotoIf($["${nota}" = "5"]?cinco)
    same => _[1-5],n(um),AGI(${DIR_PHONEVOX}/insert_note.php,"Muito Insatisfeito","${CALLERID(num)}","${nota}","${atendente}","${UNIQUEID}","${EMPRESA}")
    same => _[1-5],n,Goto(agradece)
    same => _[1-5],n(dois),AGI(${DIR_PHONEVOX}/insert_note.php,"Insatisfeito","${CALLERID(num)}","${nota}","${atendente}","${UNIQUEID}","${EMPRESA}")
    same => _[1-5],n,Goto(agradece)
    same => _[1-5],n(tres),AGI(${DIR_PHONEVOX}/insert_note.php,"Pouco Satisfeito","${CALLERID(num)}","${nota}","${atendente}","${UNIQUEID}","${EMPRESA}")
    same => _[1-5],n,Goto(agradece)
    same => _[1-5],n(quatro),AGI(${DIR_PHONEVOX}/insert_note.php,"Satisfeito","${CALLERID(num)}","${nota}","${atendente}","${UNIQUEID}","${EMPRESA}")
    same => _[1-5],n,Goto(agradece)
    same => _[1-5],n(cinco),AGI(${DIR_PHONEVOX}/insert_note.php,"Muito Satisfeito","${CALLERID(num)}","${nota}","${atendente}","${UNIQUEID}","${EMPRESA}")
    same => _[1-5],n(agradece),Playback(${DIR_PHONEVOX}/agradece_avaliacao)
    same => _[1-5],n,Hangup()

exten => _[6-9],1,NoOp(<< Nota do cliente superior a 5 >>)
    same => _[6-9],n,Goto(${CONTEXT},5,1)

    same => _ZX,1,Goto(${CONTEXT},5,1)

exten => i,1,NoOp(<< Digito nao configurado >>)
    same => i,n,Hangup()
